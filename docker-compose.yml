version: '3.9'

# ─────────────────────────────────────────────────────────────
# Development docker-compose
# Services: postgres, redis, django (dev), celery-worker, celery-beat
# ─────────────────────────────────────────────────────────────

x-django-common: &django-common
  build:
    context: .
    target: dev
  volumes:
    - .:/app
  env_file:
    - .env
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  # ── PostgreSQL 15 ──────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: rbac_db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis 7 ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rbac_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Django Development Server ─────────────────────────────
  django:
    <<: *django-common
    container_name: rbac_django
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8001:8000"
    networks:
      - default
      - global

  # ── Celery Worker ─────────────────────────────────────────
  celery-worker:
    <<: *django-common
    container_name: rbac_celery_worker
    command: celery -A config.celery worker --loglevel=info --concurrency=2
    ports: []

  # ── Celery Beat (Scheduler) ───────────────────────────────
  celery-beat:
    <<: *django-common
    container_name: rbac_celery_beat
    command: celery -A config.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    ports: []

volumes:
  postgres_data:
  redis_data:

networks:
  global:
    external: true
