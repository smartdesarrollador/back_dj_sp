# docker-compose.dokploy.yml — Para Dokploy (Traefik, no Nginx)
# Diferencias vs docker-compose.prod.yml:
#   - Red dokploy-network en vez de global
#   - Sin servicio nginx (Traefik lo reemplaza con labels)
#   - Servicio migrate dedicado (migrate + collectstatic en runtime)
#   - Volúmenes Docker nombrados (persisten entre redeploys)

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    command: >
      postgres
      -c shared_buffers=64MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c max_connections=30
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
        reservations:
          memory: 128M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    volumes:
      - redis_data:/data
    networks:
      - dokploy-network
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 160M
        reservations:
          memory: 64M

  migrate:
    build:
      context: .
      target: prod
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dokploy-network
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M

  django:
    build:
      context: .
      target: prod
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --worker-class gthread --threads 2 --timeout 120 --access-logfile - --error-logfile -
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
    env_file:
      - .env
    volumes:
      - staticfiles:/app/staticfiles
      - media:/app/media
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - dokploy-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.6'
          memory: 400M
        reservations:
          memory: 200M
    healthcheck:
      # Host header needed for Django ALLOWED_HOSTS; X-Forwarded-Proto avoids SSL redirect loop
      test:
        [
          "CMD",
          "curl",
          "-f",
          "-H",
          "X-Forwarded-Proto: https",
          "-H",
          "Host: api-rbac.digisider.com",
          "http://localhost:8000/api/health/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      # HTTPS router
      - "traefik.http.routers.rbac-api.rule=Host(`api-rbac.digisider.com`)"
      - "traefik.http.routers.rbac-api.entrypoints=websecure"
      - "traefik.http.routers.rbac-api.service=rbac-api"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.rbac-api-http.rule=Host(`api-rbac.digisider.com`)"
      - "traefik.http.routers.rbac-api-http.entrypoints=web"
      - "traefik.http.routers.rbac-api-http.middlewares=redirect-to-https@file"
      - "traefik.http.routers.rbac-api-http.service=rbac-api"
      # Backend service
      - "traefik.http.services.rbac-api.loadbalancer.server.port=8000"

  celery-worker:
    build:
      context: .
      target: prod
    command: celery -A config.celery worker --loglevel=warning --concurrency=2 --max-tasks-per-child=100
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - dokploy-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 300M
        reservations:
          memory: 128M

  celery-beat:
    build:
      context: .
      target: prod
    command: celery -A config.celery beat --loglevel=warning --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - dokploy-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 192M
        reservations:
          memory: 64M

volumes:
  postgres_data:
  redis_data:
  staticfiles:
  media:

networks:
  dokploy-network:
    external: true
